<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>IFS v5 - File System inside Image</title>

<style>
body{
font-family: Arial;
background:#0d1117;
color:white;
margin:0;
padding:0;
}
.container{
max-width:900px;
margin:40px auto;
padding:20px;
background:#161b22;
border-radius:12px;
}
input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
background:#0d1117;
color:white;
border:1px solid #333;
}
button{
margin-top:10px;
padding:10px;
background:#238636;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}
canvas{
margin-top:20px;
width:100%;
border:1px solid #444;
}
.output{
margin-top:10px;
padding:10px;
border:1px dashed #444;
white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<h2>IFS v5 - File System inside Image</h2>

<input type="file" id="fileInput">

<button onclick="encodeFile()">Encode File → Image</button>

<canvas id="canvas"></canvas>

<button onclick="saveImage()">Save Image</button>

<hr>

<input type="file" id="imgInput" accept="image/png">
<button onclick="decodeFile()">Decode File</button>

<div class="output" id="out"></div>

</div>

<script>

// ================= FILE → BYTES =================
async function fileToBytes(file){
return new Uint8Array(await file.arrayBuffer());
}

// ================= ENCODE =================
async function encodeFile(){

const file = document.getElementById("fileInput").files[0];
if(!file) return alert("اختر ملف");

const bytes = await fileToBytes(file);

// ===== File Header =====
let meta = new TextEncoder().encode(
file.name + "|" + file.type + "|" + bytes.length
);

// combine
let all = new Uint8Array(meta.length + bytes.length);
all.set(meta,0);
all.set(bytes,meta.length);

// ===== IMAGE SIZE =====
const size = Math.ceil(Math.sqrt(all.length/4));

const canvas = document.getElementById("canvas");
canvas.width = size;
canvas.height = size;

const ctx = canvas.getContext("2d");
let img = ctx.createImageData(size,size);

for(let i=0;i<all.length;i++){
img.data[i] = all[i];
}

ctx.putImageData(img,0,0);

alert("File encoded into image");
}

// ================= SAVE =================
function saveImage(){
const canvas = document.getElementById("canvas");
const a=document.createElement("a");
a.href=canvas.toDataURL("image/png");
a.download="ifs_v5.png";
a.click();
}

// ================= DECODE =================
async function decodeFile(){

const file = document.getElementById("imgInput").files[0];
if(!file) return;

let img = new Image();

img.onload = () => {

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = img.width;
canvas.height = img.height;

ctx.drawImage(img,0,0);

const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;

// remove zeros
let bytes = [];
for(let b of data){
if(b !== 0) bytes.push(b);
}

let text = new TextDecoder().decode(new Uint8Array(bytes));

// split metadata
let [meta, ...rest] = text.split("|");

// extract file info
let [name,type,size] = meta.split("|");

// convert back
let fileData = new Uint8Array(rest.map(x=>x.charCodeAt(0)));

let blob = new Blob([fileData],{type:type});

let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = name;
a.click();

document.getElementById("out").textContent =
"Restored file: " + name;
};

img.src = URL.createObjectURL(file);
}

</script>

</body>
</html>
